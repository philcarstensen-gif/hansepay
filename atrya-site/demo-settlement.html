<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Settlement Flow — Atrya</title>
<meta name="robots" content="noindex,nofollow"/>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600&family=Inter:wght@300;400;500&display=swap" rel="stylesheet"/>
<style>
/* ─── TOKENS ────────────────────────────────────────────────────────────── */
:root{
  --bg:#04060e;--text:#e2eaf8;--mid:rgba(226,234,248,.52);
  --dim:rgba(226,234,248,.32);--ac:#4FA8FF;
}

/* ─── RESET ─────────────────────────────────────────────────────────────── */
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html,body{width:100%;height:100%;overflow:hidden}
body{
  font-family:'Inter',sans-serif;-webkit-font-smoothing:antialiased;
  display:flex;align-items:center;justify-content:center;
  background:
    radial-gradient(ellipse 85% 65% at 50% 52%,rgba(14,40,150,.28) 0%,transparent 68%),
    radial-gradient(ellipse 42% 42% at 18% 22%,rgba(79,168,255,.09) 0%,transparent 55%),
    radial-gradient(ellipse 38% 38% at 82% 78%,rgba(90,55,220,.09) 0%,transparent 55%),
    radial-gradient(ellipse 30% 30% at 75% 18%,rgba(79,168,255,.05) 0%,transparent 50%),
    #04060e;
}
/* Dot-grid overlay */
body::before{
  content:'';position:fixed;inset:0;pointer-events:none;z-index:0;
  background-image:radial-gradient(circle,rgba(255,255,255,.055) 1px,transparent 1px);
  background-size:38px 38px;
  -webkit-mask-image:radial-gradient(ellipse 85% 85% at 50% 50%,black 15%,transparent 100%);
          mask-image:radial-gradient(ellipse 85% 85% at 50% 50%,black 15%,transparent 100%);
}

/* ─── 3-D SCENE ──────────────────────────────────────────────────────────── */
.scene{
  perspective:1400px;
  perspective-origin:50% 46%;
  position:relative;z-index:1;
}

/* ─── FLOAT + TILT ───────────────────────────────────────────────────────── */
.card-tilt{
  transform-style:preserve-3d;
  transform:rotateX(7deg) rotateY(-10deg) rotateZ(1.8deg);
}

/* ─── LIQUID BORDER RING ─────────────────────────────────────────────────── */
@property --liquid-angle{syntax:'<angle>';inherits:false;initial-value:225deg}
@keyframes liquidFlow{to{--liquid-angle:585deg}}

.shimmer-ring{
  padding:1.5px;border-radius:30px;
  animation:liquidFlow 10s linear infinite;
  background:conic-gradient(
    from var(--liquid-angle) at 50% 50%,
    rgba(18,12,52,.04)   0deg,
    rgba(72,138,255,.11) 72deg,
    rgba(180,220,255,.68) 130deg,
    rgba(96,178,255,.32) 160deg,
    rgba(60,88,240,.18)  210deg,
    rgba(38,52,200,.13)  254deg,
    rgba(22,28,128,.05)  296deg,
    rgba(16,10,48,.03)   332deg,
    rgba(18,12,52,.04)   360deg
  );
  /* Deep 3-D shadow emphasises the tilt */
  box-shadow:
    0 70px 140px rgba(0,0,0,.75),
    0 28px 60px  rgba(0,0,0,.45),
    0  8px 24px  rgba(0,0,0,.30),
    0  0   90px  rgba(79,168,255,.13),
    0  0  200px  rgba(79,168,255,.06);
}

/* ─── CARD (Tier 1 liquid glass) ─────────────────────────────────────────── */
.card{
  width:680px;
  border-radius:28px;padding:36px;
  position:relative;overflow:hidden;
  background:
    radial-gradient(ellipse 90% 55% at 22% 0%,rgba(79,168,255,.11) 0%,transparent 55%),
    radial-gradient(ellipse 55% 45% at 88% 100%,rgba(90,55,220,.08) 0%,transparent 50%),
    radial-gradient(ellipse 40% 40% at 50% 50%,rgba(14,30,90,.18) 0%,transparent 65%),
    linear-gradient(148deg,rgba(10,24,66,.92) 0%,rgba(6,14,44,.96) 50%,rgba(4,8,28,.93) 100%);
  backdrop-filter:blur(64px) saturate(2.3) brightness(1.05);
  -webkit-backdrop-filter:blur(64px) saturate(2.3) brightness(1.05);
  box-shadow:
    0 0 0 .5px rgba(255,255,255,.07) inset,
    0 1px 0  rgba(255,255,255,.13) inset,
    0 -1px 0 rgba(0,0,0,.20) inset;
}
/* Prismatic top highlight */
.card::before{
  content:'';position:absolute;top:0;left:8%;right:8%;height:1px;
  background:linear-gradient(90deg,
    transparent,
    rgba(255,255,255,.12) 20%,
    rgba(140,210,255,.42) 48%,
    rgba(255,255,255,.20) 60%,
    rgba(79,168,255,.18) 78%,
    transparent);
  pointer-events:none;
}
/* Inner corner halos */
.card::after{
  content:'';position:absolute;inset:0;pointer-events:none;border-radius:28px;
  background:
    radial-gradient(ellipse 40% 28% at 0% 0%,rgba(79,168,255,.05) 0%,transparent 60%),
    radial-gradient(ellipse 30% 22% at 100% 100%,rgba(100,60,220,.05) 0%,transparent 60%);
}

/* ─── CARD HEADER ─────────────────────────────────────────────────────────── */
.card-hdr{display:flex;align-items:center;justify-content:space-between;margin-bottom:32px}
.card-title{font-size:11.5px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;color:var(--dim)}
.card-status{display:flex;align-items:center;gap:7px;font-size:13px;color:var(--dim)}
.status-dot{
  width:7px;height:7px;border-radius:50%;
  background:rgba(79,230,130,.9);
  animation:sdot 2.8s ease-in-out infinite;
  box-shadow:0 0 10px rgba(79,230,130,.65);
}
@keyframes sdot{0%,100%{opacity:1;transform:scale(1)}50%{opacity:.4;transform:scale(.65)}}

/* ─── FLOW NODES ──────────────────────────────────────────────────────────── */
.flow-nodes{display:flex;align-items:center;margin-bottom:26px}
.node{display:flex;flex-direction:column;align-items:center;gap:12px;flex-shrink:0}
.node-icon{
  width:76px;height:76px;border-radius:20px;
  display:flex;align-items:center;justify-content:center;
  background:rgba(6,12,38,.88);
  border:1px solid rgba(255,255,255,.11);
  box-shadow:0 6px 18px rgba(0,0,0,.40),0 2px 4px rgba(0,0,0,.25);
}
.node-icon svg{width:30px;height:30px;color:var(--ac)}
.node-lbl{font-size:12px;font-weight:400;color:var(--dim)}

/* Center Atrya node — elevated */
.node.center .node-icon{
  width:84px;height:84px;border-radius:22px;
  background:
    radial-gradient(ellipse 80% 70% at 28% 20%,rgba(79,168,255,.14) 0%,transparent 60%),
    rgba(8,17,52,.92);
  border:1px solid rgba(255,255,255,.20);
  box-shadow:
    0 1px 0 rgba(255,255,255,.16) inset,
    0 10px 28px rgba(0,0,0,.42),
    0 0  36px rgba(79,168,255,.13);
}
.node.center .node-lbl{color:var(--ac);font-weight:500;font-size:13px}

/* Connector lines */
.flow-line{
  flex:1;height:1px;margin:0 14px;top:-14px;position:relative;
  background:linear-gradient(90deg,rgba(79,168,255,.15),rgba(79,168,255,.42),rgba(79,168,255,.15));
}
.flow-dot{
  position:absolute;width:7px;height:7px;border-radius:50%;
  background:var(--ac);top:-3px;opacity:0;
  box-shadow:0 0 10px rgba(79,168,255,.8);
}
@keyframes flowLeft{
  0%,31%{left:-7px;opacity:0}
  33%{left:-7px;opacity:.9}
  48%{left:calc(100% + 7px);opacity:.9}
  50%,100%{left:calc(100% + 7px);opacity:0}
}
@keyframes flowRight{
  0%,45%{left:-7px;opacity:0}
  47%{left:-7px;opacity:.9}
  63%{left:calc(100% + 7px);opacity:.9}
  65%,100%{left:calc(100% + 7px);opacity:0}
}
.flow-dot{animation:flowLeft 10s ease-in-out infinite}
.flow-dot.d2{animation:flowRight 10s ease-in-out infinite}

/* ─── LOG TERMINAL ────────────────────────────────────────────────────────── */
.log{
  background:rgba(0,0,0,.42);
  border:1px solid rgba(255,255,255,.065);
  border-top:1px solid rgba(255,255,255,.11);
  border-radius:15px;
  padding:20px 22px 24px;
  min-height:156px;
  overflow:hidden;
  position:relative;
  box-shadow:
    0 1px 0 rgba(255,255,255,.05) inset,
    0 -1px 0 rgba(0,0,0,.22);
}
/* Subtle scanline sheen */
.log::before{
  content:'';position:absolute;inset:0;border-radius:15px;pointer-events:none;
  background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(255,255,255,.008) 3px,rgba(255,255,255,.008) 4px);
}

.sline{
  font-family:'SF Mono','Fira Code','Fira Mono',monospace;
  font-size:12.5px;line-height:1.78;
  opacity:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;
  position:relative;z-index:1;
}
.actor{font-weight:500;letter-spacing:.02em}
.actor.ext{color:rgba(226,234,248,.34)}
.actor.sys{color:var(--ac);opacity:.82}
.sep{color:rgba(226,234,248,.18);margin:0 5px 0 0}
.msg{color:rgba(226,234,248,.60)}
.ok{color:rgba(79,230,130,.65)}

@keyframes sl1{0%,4%{opacity:0;transform:translateY(4px)}7%,82%{opacity:1;transform:translateY(0)}88%,100%{opacity:0}}
@keyframes sl2{0%,18%{opacity:0;transform:translateY(4px)}21%,82%{opacity:1;transform:translateY(0)}88%,100%{opacity:0}}
@keyframes sl3{0%,32%{opacity:0;transform:translateY(4px)}35%,82%{opacity:1;transform:translateY(0)}88%,100%{opacity:0}}
@keyframes sl4{0%,46%{opacity:0;transform:translateY(4px)}49%,82%{opacity:1;transform:translateY(0)}88%,100%{opacity:0}}
@keyframes sl5{0%,60%{opacity:0;transform:translateY(4px)}63%,82%{opacity:1;transform:translateY(0)}88%,100%{opacity:0}}
.sline:nth-child(1){animation:sl1 10s ease-out infinite}
.sline:nth-child(2){animation:sl2 10s ease-out infinite}
.sline:nth-child(3){animation:sl3 10s ease-out infinite}
.sline:nth-child(4){animation:sl4 10s ease-out infinite}
.sline:nth-child(5){animation:sl5 10s ease-out infinite}
</style>
</head>
<body>
<div class="scene">
  <div class="card-tilt">
    <div class="shimmer-ring">
      <div class="card">

        <div class="card-hdr">
          <span class="card-title">Settlement Flow</span>
          <span class="card-status"><span class="status-dot"></span>Preview</span>
        </div>

        <div class="flow-nodes">
          <!-- AI Agent -->
          <div class="node">
            <div class="node-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <rect x="3" y="3" width="18" height="18" rx="2"/>
                <path d="M9 9h.01M15 9h.01M9 15h6"/>
              </svg>
            </div>
            <span class="node-lbl">AI Agent</span>
          </div>

          <div class="flow-line"><div class="flow-dot"></div></div>

          <!-- Atrya (center) -->
          <div class="node center">
            <div class="node-icon">
              <svg viewBox="0 0 100 100" fill="none" width="34" height="34">
                <path fill="var(--ac)" d="M11.9,47 L11.9,33 Q11.9,28 16.2,25.5 L45.7,8.5 Q50,6 54.3,8.5 L83.8,25.5 Q88.1,28 88.1,33 L88.1,47 C74,47 63,22 50,22 C37,22 26,47 11.9,47Z"/>
                <path fill="var(--ac)" d="M11.9,53 L11.9,67 Q11.9,72 16.2,74.5 L45.7,91.5 Q50,94 54.3,91.5 L83.8,74.5 Q88.1,72 88.1,67 L88.1,53 C74,53 63,78 50,78 C37,78 26,53 11.9,53Z"/>
              </svg>
            </div>
            <span class="node-lbl">Atrya</span>
          </div>

          <div class="flow-line"><div class="flow-dot d2"></div></div>

          <!-- Recipient -->
          <div class="node">
            <div class="node-icon">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round">
                <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"/>
                <polyline points="9 22 9 12 15 12 15 22"/>
              </svg>
            </div>
            <span class="node-lbl">Recipient</span>
          </div>
        </div>

        <div class="log">
          <div class="sline"><span class="actor ext">agent</span><span class="sep">:</span><span class="msg"> Requesting access to premium API...</span></div>
          <div class="sline"><span class="actor ext">service</span><span class="sep">:</span><span class="msg"> Payment required to proceed</span></div>
          <div class="sline"><span class="actor ext">agent</span><span class="sep">:</span><span class="msg"> Routing payment via Atrya...</span></div>
          <div class="sline"><span class="actor sys">atrya</span><span class="sep">:</span><span class="msg"> Budget <span class="ok">approved ✓</span>&nbsp;&nbsp;Compliance <span class="ok">passed ✓</span></span></div>
          <div class="sline"><span class="actor ext">service</span><span class="sep">:</span><span class="msg"> Access granted — <span class="ok">returning data</span></span></div>
        </div>

      </div>
    </div>
  </div>
</div>
</body>
</html>
