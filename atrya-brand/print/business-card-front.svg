<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 807 504" width="807" height="504">
  <!--
    Standard business card: 85mm × 55mm
    At 240 dpi: 807 × 504 px  (85 * 9.4961, 55 * 9.1636 ≈ close enough)
    Bleed-safe zone from ~20px inside edges
  -->
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600&amp;family=Inter:wght@300;400;500&amp;display=swap');
      .bc-logo    { font-family:'Syne',sans-serif;font-weight:600;font-size:38px;fill:#e2eaf8;letter-spacing:-0.025em; }
      .bc-name    { font-family:'Syne',sans-serif;font-weight:500;font-size:22px;fill:#e2eaf8;letter-spacing:-0.02em; }
      .bc-title   { font-family:'Inter',sans-serif;font-weight:300;font-size:14px;fill:#4FA8FF;letter-spacing:0.08em;text-transform:uppercase; }
      .bc-contact { font-family:'Inter',sans-serif;font-weight:300;font-size:12px;fill:rgba(226,234,248,0.60);letter-spacing:0.02em; }
      .bc-url     { font-family:'Inter',sans-serif;font-weight:500;font-size:13px;fill:#4FA8FF;letter-spacing:0.06em; }
    </style>
    <linearGradient id="bcBg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04060e"/>
      <stop offset="100%" stop-color="#070b18"/>
    </linearGradient>
    <radialGradient id="bcGlow" cx="20%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#4FA8FF" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#04060e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Card background -->
  <rect width="807" height="504" rx="18" fill="url(#bcBg)"/>
  <rect width="807" height="504" rx="18" fill="url(#bcGlow)"/>

  <!-- Top accent border -->
  <rect x="0" y="0" width="807" height="4" rx="2" fill="#4FA8FF" fill-opacity="0.7"/>

  <!-- Top-left logo -->
  <!-- Icon: scale 2, translate (28, 22) -->
  <g transform="translate(28, 22) scale(2)">
    <polygon points="36,20 28,6 12,6 4,20 12,34 28,34" fill="none" stroke="#e2eaf8" stroke-width="1.6"/>
    <polygon points="20,13 27,20 20,27 13,20" fill="#e2eaf8"/>
  </g>
  <text x="112" y="74" class="bc-logo">Atrya</text>

  <!-- Subtle horizontal rule -->
  <line x1="28" y1="100" x2="779" y2="100" stroke="rgba(79,168,255,0.12)" stroke-width="1"/>

  <!-- Center: Name & Title -->
  <text x="404" y="244" class="bc-name" text-anchor="middle">[Your Name]</text>
  <text x="404" y="274" class="bc-title" text-anchor="middle">[Your Title]</text>

  <!-- Bottom: Contact info -->
  <line x1="28" y1="390" x2="779" y2="390" stroke="rgba(79,168,255,0.10)" stroke-width="1"/>
  <text x="40" y="424" class="bc-contact">[your@atrya.io]</text>
  <text x="40" y="450" class="bc-contact">[+49 000 000 000]</text>
  <text x="767" y="424" class="bc-url" text-anchor="end">atrya.io</text>
  <text x="767" y="450" class="bc-contact" text-anchor="end">Stadtdeich 2-4, 20097 Hamburg</text>

  <!-- Bottom accent line -->
  <rect x="0" y="500" width="807" height="4" rx="2" fill="#4FA8FF" fill-opacity="0.25"/>
</svg>
