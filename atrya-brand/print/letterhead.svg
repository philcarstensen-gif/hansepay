<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 595 842" width="595" height="842">
  <!--
    A4 letterhead: 210mm × 297mm @ 72dpi = 595 × 842 px
    Header zone: 0–100px  |  Body zone: 120–740px  |  Footer zone: 760–842px
  -->
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600&amp;family=Inter:wght@300;400;500&amp;display=swap');
      .lh-logo      { font-family:'Syne',sans-serif;font-weight:600;font-size:28px;fill:#0c1628;letter-spacing:-0.025em; }
      .lh-footer    { font-family:'Inter',Arial,sans-serif;font-weight:300;font-size:9px;fill:#6b7a99;letter-spacing:0.3px; }
      .lh-footer-a  { font-family:'Inter',Arial,sans-serif;font-weight:400;font-size:9px;fill:#1a8ee0; }
      .lh-body-hint { font-family:'Inter',Arial,sans-serif;font-weight:300;font-size:10px;fill:#cbd5e1; }
    </style>
  </defs>

  <!-- Page background: white -->
  <rect width="595" height="842" fill="#ffffff"/>

  <!-- Header band: light blue-grey -->
  <rect x="0" y="0" width="595" height="88" fill="#f0f4fc"/>
  <!-- Header bottom border -->
  <rect x="0" y="88" width="595" height="2" fill="#1a8ee0" fill-opacity="0.25"/>
  <!-- Header accent left strip -->
  <rect x="0" y="0" width="4" height="88" fill="#1a8ee0"/>

  <!-- Logo in header -->
  <g transform="translate(24, 24) scale(1)">
    <polygon points="36,20 28,6 12,6 4,20 12,34 28,34" fill="none" stroke="#0c1628" stroke-width="1.6"/>
    <polygon points="20,13 27,20 20,27 13,20" fill="#0c1628"/>
  </g>
  <text x="80" y="50" class="lh-logo">Atrya</text>
  <text x="80" y="68" style="font-family:'Inter',Arial,sans-serif;font-size:10px;fill:#1a8ee0;letter-spacing:1.5px;">PAYMENT LOGIC. SETTLEMENT. UNIFIED.</text>

  <!-- Right of header: company name + url -->
  <text x="571" y="42" style="font-family:'Inter',Arial,sans-serif;font-size:10px;fill:#374151;text-anchor:end;">Caplend Technologies GmbH</text>
  <text x="571" y="57" style="font-family:'Inter',Arial,sans-serif;font-size:10px;fill:#1a8ee0;text-anchor:end;">atrya.io</text>

  <!-- Body area: blank white with very subtle guide lines for text -->
  <!-- Date line placeholder -->
  <rect x="40" y="130" width="180" height="1" fill="#e2e8f0"/>
  <text x="40" y="125" class="lh-body-hint">Date</text>

  <!-- Recipient block placeholder lines -->
  <rect x="40" y="175" width="220" height="1" fill="#e2e8f0"/>
  <rect x="40" y="193" width="180" height="1" fill="#e2e8f0"/>
  <rect x="40" y="211" width="200" height="1" fill="#e2e8f0"/>
  <rect x="40" y="229" width="160" height="1" fill="#e2e8f0"/>
  <text x="40" y="170" class="lh-body-hint">Recipient</text>

  <!-- Subject line placeholder -->
  <rect x="40" y="280" width="460" height="1.5" fill="#e2e8f0"/>
  <text x="40" y="275" class="lh-body-hint">Subject / Re:</text>

  <!-- Body lines placeholder (simulating lined area) -->
  <g stroke="#f0f4fc" stroke-width="1">
    <line x1="40" y1="330" x2="555" y2="330"/>
    <line x1="40" y1="350" x2="555" y2="350"/>
    <line x1="40" y1="370" x2="555" y2="370"/>
    <line x1="40" y1="390" x2="555" y2="390"/>
    <line x1="40" y1="410" x2="555" y2="410"/>
    <line x1="40" y1="430" x2="555" y2="430"/>
    <line x1="40" y1="450" x2="555" y2="450"/>
    <line x1="40" y1="470" x2="555" y2="470"/>
    <line x1="40" y1="490" x2="555" y2="490"/>
    <line x1="40" y1="510" x2="555" y2="510"/>
    <line x1="40" y1="530" x2="555" y2="530"/>
    <line x1="40" y1="550" x2="555" y2="550"/>
    <line x1="40" y1="570" x2="555" y2="570"/>
    <line x1="40" y1="590" x2="555" y2="590"/>
    <line x1="40" y1="610" x2="555" y2="610"/>
    <line x1="40" y1="630" x2="555" y2="630"/>
    <line x1="40" y1="650" x2="555" y2="650"/>
    <line x1="40" y1="670" x2="555" y2="670"/>
    <line x1="40" y1="690" x2="555" y2="690"/>
    <line x1="40" y1="710" x2="555" y2="710"/>
  </g>

  <!-- Footer band -->
  <rect x="0" y="760" width="595" height="82" fill="#f0f4fc"/>
  <rect x="0" y="760" width="595" height="1.5" fill="#1a8ee0" fill-opacity="0.20"/>

  <!-- Footer icon small -->
  <g transform="translate(24, 774) scale(0.7)">
    <polygon points="36,20 28,6 12,6 4,20 12,34 28,34" fill="none" stroke="#0c1628" stroke-width="1.6"/>
    <polygon points="20,13 27,20 20,27 13,20" fill="#0c1628"/>
  </g>

  <!-- Footer text -->
  <text x="58" y="790" class="lh-footer">Caplend Technologies GmbH · c/o Factory Works GmbH · Stadtdeich 2-4 · 20097 Hamburg · Germany</text>
  <text x="58" y="805" class="lh-footer">
    <tspan>Registered in Germany · </tspan>
    <tspan class="lh-footer-a">hello@atrya.io</tspan>
    <tspan> · </tspan>
    <tspan class="lh-footer-a">atrya.io</tspan>
  </text>

  <!-- Page number placeholder -->
  <text x="555" y="810" class="lh-footer" text-anchor="end">Page 1</text>
</svg>
