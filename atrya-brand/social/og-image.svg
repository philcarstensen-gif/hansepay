<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" width="1200" height="630">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600&amp;family=Inter:wght@300;400;500&amp;display=swap');
      .brand   { font-family: 'Syne', sans-serif; font-weight: 500; font-size: 88px; fill: #e2eaf8; letter-spacing: -0.03em; }
      .tagline { font-family: 'Inter', sans-serif; font-weight: 300; font-size: 24px; fill: rgba(226,234,248,0.76); line-height: 1.74; }
      .label   { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 13px; fill: #4FA8FF; letter-spacing: 0.08em; text-transform: uppercase; }
    </style>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04060e"/>
      <stop offset="100%" stop-color="#070b18"/>
    </linearGradient>
    <radialGradient id="glL" cx="15%" cy="80%" r="40%">
      <stop offset="0%" stop-color="#4FA8FF" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#04060e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glR" cx="90%" cy="20%" r="35%">
      <stop offset="0%" stop-color="#4FA8FF" stop-opacity="0.09"/>
      <stop offset="100%" stop-color="#04060e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1200" height="630" fill="url(#bg)"/>
  <rect width="1200" height="630" fill="url(#glL)"/>
  <rect width="1200" height="630" fill="url(#glR)"/>

  <!-- Border frame -->
  <rect x="24" y="24" width="1152" height="582" rx="4" fill="none" stroke="rgba(79,168,255,0.14)" stroke-width="1"/>

  <!-- Background hex pattern right side -->
  <g opacity="0.06">
    <g transform="translate(840, 120) scale(6)">
      <path d="M36 20L28 6L12 6L4 20L12 34L28 34Z" stroke="#4FA8FF" stroke-width="1.2" stroke-linejoin="round" fill="none"/>
    </g>
    <g transform="translate(990, 80) scale(3.5)">
      <path d="M36 20L28 6L12 6L4 20L12 34L28 34Z" stroke="#4FA8FF" stroke-width="1.4" stroke-linejoin="round" fill="none"/>
    </g>
    <g transform="translate(980, 380) scale(4.5)">
      <path d="M36 20L28 6L12 6L4 20L12 34L28 34Z" stroke="#4FA8FF" stroke-width="1.2" stroke-linejoin="round" fill="none"/>
    </g>
    <g transform="translate(1080, 300) scale(2.5)">
      <path d="M36 20L28 6L12 6L4 20L12 34L28 34Z" stroke="#4FA8FF" stroke-width="1.6" stroke-linejoin="round" fill="none"/>
    </g>
  </g>

  <!-- Logo mark top-left -->
  <g transform="translate(60, 52) scale(2.2)">
    <path d="M36 20L28 6L12 6L4 20L12 34L28 34Z" stroke="#e2eaf8" stroke-width="1.6" stroke-linejoin="round" fill="none"/>
    <path d="M20 13L27 20L20 27L13 20Z" fill="#e2eaf8"/>
  </g>

  <!-- Blue accent bar -->
  <rect x="60" y="192" width="48" height="2" fill="#4FA8FF" rx="1"/>

  <!-- Label -->
  <text x="60" y="178" class="label">Atrya</text>

  <!-- Main heading -->
  <text x="60" y="310" class="brand">Payment Logic.</text>

  <!-- Tagline -->
  <text x="60" y="368" class="tagline">Settlement. Unified.</text>
  <text x="60" y="404" class="tagline">Europe's first regulated on-chain FX layer</text>

  <!-- Bottom bar -->
  <rect x="0" y="590" width="1200" height="40" fill="#070b18"/>
  <text x="60" y="614" class="label">atrya.io</text>
  <text x="1140" y="614" class="label" text-anchor="end">Caplend Technologies GmbH</text>
</svg>
