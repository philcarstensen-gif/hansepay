<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1584 396" width="1584" height="396">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600&amp;family=Inter:wght@300;400;500&amp;display=swap');
      .logo-text { font-family: 'Syne', sans-serif; font-weight: 600; font-size: 50px; fill: #e2eaf8; letter-spacing: -1.25px; }
      .tagline   { font-family: 'Inter', sans-serif; font-weight: 300; font-size: 20px; fill: rgba(226,234,248,0.76); letter-spacing: 0.08em; text-transform: uppercase; }
      .url       { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 15px; fill: #4FA8FF; letter-spacing: 0.08em; text-transform: uppercase; }
    </style>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#04060e"/>
      <stop offset="60%" stop-color="#070b18"/>
      <stop offset="100%" stop-color="#0a1228"/>
    </linearGradient>
    <radialGradient id="glowLeft" cx="20%" cy="50%" r="40%">
      <stop offset="0%" stop-color="#4FA8FF" stop-opacity="0.08"/>
      <stop offset="100%" stop-color="#04060e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="glowRight" cx="85%" cy="50%" r="35%">
      <stop offset="0%" stop-color="#4FA8FF" stop-opacity="0.10"/>
      <stop offset="100%" stop-color="#04060e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1584" height="396" fill="url(#bgGrad)"/>
  <rect width="1584" height="396" fill="url(#glowLeft)"/>
  <rect width="1584" height="396" fill="url(#glowRight)"/>

  <!-- Dot field -->
  <g fill="#4FA8FF" fill-opacity="0.16">
    <circle cx="80" cy="40" r="1.5"/><circle cx="160" cy="80" r="1"/><circle cx="240" cy="30" r="1.5"/>
    <circle cx="320" cy="70" r="1"/><circle cx="400" cy="50" r="2"/><circle cx="480" cy="90" r="1"/>
    <circle cx="560" cy="20" r="1.5"/><circle cx="640" cy="60" r="1"/><circle cx="120" cy="130" r="1"/>
    <circle cx="200" cy="160" r="1.5"/><circle cx="300" cy="110" r="1"/><circle cx="440" cy="140" r="1.5"/>
    <circle cx="100" cy="320" r="1"/><circle cx="220" cy="360" r="1.5"/><circle cx="340" cy="340" r="1"/>
    <circle cx="460" cy="380" r="1.5"/><circle cx="580" cy="350" r="1"/><circle cx="700" cy="370" r="1.5"/>
    <circle cx="1100" cy="40" r="1.5"/><circle cx="1200" cy="70" r="1"/><circle cx="1300" cy="30" r="2"/>
    <circle cx="1400" cy="90" r="1"/><circle cx="1500" cy="50" r="1.5"/><circle cx="1150" cy="330" r="1"/>
    <circle cx="1250" cy="360" r="1.5"/><circle cx="1350" cy="310" r="1"/><circle cx="1450" cy="350" r="1.5"/>
    <circle cx="750" cy="20" r="1"/><circle cx="850" cy="380" r="1.5"/><circle cx="950" cy="40" r="1"/>
    <circle cx="1050" cy="350" r="1.5"/>
  </g>

  <!-- Thin rule -->
  <line x1="60" y1="198" x2="540" y2="198" stroke="rgba(79,168,255,0.15)" stroke-width="1"/>

  <!-- Logo group -->
  <!-- Mark: scale 3, center of 40×40 → translate so center is at ~120, 198 -->
  <g transform="translate(60, 138) scale(3)">
    <path d="M36 20L28 6L12 6L4 20L12 34L28 34Z" stroke="#e2eaf8" stroke-width="1.6" stroke-linejoin="round" fill="none"/>
    <path d="M20 13L27 20L20 27L13 20Z" fill="#e2eaf8"/>
  </g>
  <text x="186" y="224" class="logo-text">Atrya</text>

  <!-- Divider -->
  <line x1="560" y1="120" x2="560" y2="276" stroke="rgba(226,234,248,0.10)" stroke-width="1"/>

  <!-- Center: Tagline -->
  <text x="792" y="180" class="tagline" text-anchor="middle">Payment logic. Settlement.</text>
  <text x="792" y="214" class="tagline" text-anchor="middle">Unified.</text>
  <text x="792" y="264" class="url" text-anchor="middle">atrya.io</text>

  <!-- Divider -->
  <line x1="1024" y1="120" x2="1024" y2="276" stroke="rgba(226,234,248,0.10)" stroke-width="1"/>

  <!-- Right: Geometric decoration -->
  <g transform="translate(1200, 198) scale(5)" opacity="0.16">
    <path d="M36 20L28 6L12 6L4 20L12 34L28 34Z" stroke="#4FA8FF" stroke-width="1.2" stroke-linejoin="round" fill="none"/>
  </g>
  <g transform="translate(1340, 148) scale(3)" opacity="0.20">
    <path d="M36 20L28 6L12 6L4 20L12 34L28 34Z" stroke="#4FA8FF" stroke-width="1.4" stroke-linejoin="round" fill="none"/>
  </g>
  <g transform="translate(1282, 222) scale(2.2)" opacity="0.50">
    <path d="M20 13L27 20L20 27L13 20Z" fill="#4FA8FF"/>
  </g>
  <g transform="translate(1120, 180) scale(1.8)" opacity="0.18">
    <path d="M36 20L28 6L12 6L4 20L12 34L28 34Z" stroke="#4FA8FF" stroke-width="1.6" stroke-linejoin="round" fill="none"/>
  </g>
  <line x1="1060" y1="280" x2="1524" y2="280" stroke="rgba(79,168,255,0.20)" stroke-width="1"/>
  <line x1="1060" y1="116" x2="1524" y2="116" stroke="rgba(79,168,255,0.10)" stroke-width="1"/>
</svg>
