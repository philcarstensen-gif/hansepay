<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1080 1920" width="1080" height="1920">
  <defs>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Syne:wght@400;500;600&amp;family=Inter:wght@300;400;500&amp;display=swap');
      .st-brand   { font-family: 'Syne', sans-serif; font-weight: 500; font-size: 92px; fill: #e2eaf8; letter-spacing: -0.03em; text-anchor: middle; }
      .st-tagline { font-family: 'Inter', sans-serif; font-weight: 300; font-size: 28px; fill: rgba(226,234,248,0.76); line-height: 1.74; text-anchor: middle; }
      .st-sub     { font-family: 'Inter', sans-serif; font-weight: 300; font-size: 20px; fill: rgba(226,234,248,0.50); text-anchor: middle; }
      .st-cta     { font-family: 'Syne', sans-serif; font-weight: 500; font-size: 26px; fill: #04060e; letter-spacing: -0.025em; text-anchor: middle; }
      .st-url     { font-family: 'Inter', sans-serif; font-weight: 500; font-size: 18px; fill: #4FA8FF; letter-spacing: 0.08em; text-transform: uppercase; text-anchor: middle; }
    </style>
    <linearGradient id="stBg" x1="0%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%" stop-color="#04060e"/>
      <stop offset="50%" stop-color="#070b18"/>
      <stop offset="100%" stop-color="#04060e"/>
    </linearGradient>
    <radialGradient id="stGlow1" cx="50%" cy="30%" r="50%">
      <stop offset="0%" stop-color="#4FA8FF" stop-opacity="0.11"/>
      <stop offset="100%" stop-color="#04060e" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="stGlow2" cx="50%" cy="75%" r="40%">
      <stop offset="0%" stop-color="#4FA8FF" stop-opacity="0.07"/>
      <stop offset="100%" stop-color="#04060e" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <rect width="1080" height="1920" fill="url(#stBg)"/>
  <rect width="1080" height="1920" fill="url(#stGlow1)"/>
  <rect width="1080" height="1920" fill="url(#stGlow2)"/>

  <!-- Decorative mark pattern -->
  <g fill="none" stroke="#4FA8FF" stroke-opacity="0.07">
    <g transform="translate(60, 60) scale(3)">
      <path d="M36 20L28 6L12 6L4 20L12 34L28 34Z" stroke-width="1.4" stroke-linejoin="round"/>
    </g>
    <g transform="translate(880, 100) scale(2.5)">
      <path d="M36 20L28 6L12 6L4 20L12 34L28 34Z" stroke-width="1.4" stroke-linejoin="round"/>
    </g>
    <g transform="translate(940, 280) scale(1.8)">
      <path d="M36 20L28 6L12 6L4 20L12 34L28 34Z" stroke-width="1.6" stroke-linejoin="round"/>
    </g>
    <g transform="translate(40, 340) scale(2)">
      <path d="M36 20L28 6L12 6L4 20L12 34L28 34Z" stroke-width="1.5" stroke-linejoin="round"/>
    </g>
    <g transform="translate(20, 800) scale(4)">
      <path d="M36 20L28 6L12 6L4 20L12 34L28 34Z" stroke-width="1.2" stroke-linejoin="round"/>
    </g>
    <g transform="translate(900, 760) scale(3.5)">
      <path d="M36 20L28 6L12 6L4 20L12 34L28 34Z" stroke-width="1.2" stroke-linejoin="round"/>
    </g>
    <g transform="translate(500, 700) scale(2)">
      <path d="M36 20L28 6L12 6L4 20L12 34L28 34Z" stroke-width="1.5" stroke-linejoin="round"/>
    </g>
    <g transform="translate(60, 1500) scale(3)">
      <path d="M36 20L28 6L12 6L4 20L12 34L28 34Z" stroke-width="1.3" stroke-linejoin="round"/>
    </g>
    <g transform="translate(880, 1540) scale(2.5)">
      <path d="M36 20L28 6L12 6L4 20L12 34L28 34Z" stroke-width="1.4" stroke-linejoin="round"/>
    </g>
    <g transform="translate(940, 1700) scale(2)">
      <path d="M36 20L28 6L12 6L4 20L12 34L28 34Z" stroke-width="1.5" stroke-linejoin="round"/>
    </g>
    <g transform="translate(40, 1760) scale(1.8)">
      <path d="M36 20L28 6L12 6L4 20L12 34L28 34Z" stroke-width="1.6" stroke-linejoin="round"/>
    </g>
  </g>

  <!-- TOP: Logo section — mark centered at top -->
  <!-- scale 12, translate = 540 - 20*12 = 300 -->
  <g transform="translate(300, 180) scale(12)">
    <path d="M36 20L28 6L12 6L4 20L12 34L28 34Z" stroke="#e2eaf8" stroke-width="1.6" stroke-linejoin="round" fill="none"/>
    <path d="M20 13L27 20L20 27L13 20Z" fill="#e2eaf8"/>
  </g>
  <text x="540" y="698" class="st-brand">Atrya</text>

  <!-- Divider -->
  <rect x="390" y="728" width="300" height="1" fill="#4FA8FF" fill-opacity="0.35" rx="1"/>

  <!-- MIDDLE: Tagline -->
  <text x="540" y="916" class="st-tagline">Payment logic.</text>
  <text x="540" y="966" class="st-tagline">Settlement.</text>
  <text x="540" y="1016" class="st-tagline">Unified.</text>

  <text x="540" y="1096" class="st-sub">Europe's first regulated on-chain FX layer</text>
  <text x="540" y="1140" class="st-sub">and native PSP</text>

  <!-- BOTTOM: CTA -->
  <rect x="240" y="1578" width="600" height="78" rx="39" fill="#4FA8FF"/>
  <text x="540" y="1626" class="st-cta">Learn more at atrya.io</text>

  <text x="540" y="1758" class="st-url">atrya.io</text>
  <text x="540" y="1818" font-family="Inter, sans-serif" font-size="17" fill="rgba(226,234,248,0.28)" text-anchor="middle" letter-spacing="0.02em">Caplend Technologies GmbH</text>
</svg>
