<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 180 180" width="180" height="180">
  <defs>
    <radialGradient id="bgG" cx="50%" cy="50%" r="70%">
      <stop offset="0%" stop-color="#0d1930"/>
      <stop offset="100%" stop-color="#04060e"/>
    </radialGradient>
  </defs>
  <!-- Apple touch icon: rounded square -->
  <rect width="180" height="180" rx="40" ry="40" fill="url(#bgG)"/>
  <!-- Glow -->
  <ellipse cx="90" cy="90" rx="50" ry="50" fill="#4FA8FF" fill-opacity="0.08"/>
  <!-- Icon centered and scaled: scale=3.6, original center at (20,20), translate to center at (90,90) -->
  <g transform="translate(18, 18) scale(3.6)">
    <polygon points="36,20 28,6 12,6 4,20 12,34 28,34" fill="none" stroke="#ffffff" stroke-width="1.6"/>
    <polygon points="20,13 27,20 20,27 13,20" fill="#ffffff"/>
  </g>
</svg>
