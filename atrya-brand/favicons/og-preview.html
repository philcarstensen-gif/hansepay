<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Atrya Favicon Preview</title>
  <style>
    body { background: #04060e; color: #e2eaf8; font-family: 'Inter', system-ui, sans-serif; padding: 40px; }
    h1 { font-size: 22px; color: #4FA8FF; margin-bottom: 8px; }
    p { color: rgba(226,234,248,.6); font-size: 13px; margin-bottom: 40px; }
    .grid { display: flex; flex-wrap: wrap; gap: 40px; align-items: flex-end; }
    .item { display: flex; flex-direction: column; align-items: center; gap: 12px; }
    .label { font-size: 12px; color: rgba(226,234,248,.55); text-align: center; }
    .size { font-size: 11px; color: #4FA8FF; }
    .bg-check { background: repeating-conic-gradient(#0d1930 0% 25%, #04060e 0% 50%) 0 0 / 12px 12px; border-radius: 4px; padding: 8px; }
  </style>
</head>
<body>
  <h1>Atrya — Favicon Preview</h1>
  <p>All favicon variations at actual and 2× preview size.</p>

  <div class="grid">

    <div class="item">
      <div class="bg-check">
        <img src="favicon-16.svg" width="16" height="16" alt="16px favicon"/>
      </div>
      <div class="label">favicon-16.svg<br/><span class="size">16×16</span></div>
    </div>

    <div class="item">
      <div class="bg-check">
        <img src="favicon-16.svg" width="32" height="32" alt="16px favicon 2x"/>
      </div>
      <div class="label">favicon-16.svg<br/><span class="size">16×16 @ 2×</span></div>
    </div>

    <div class="item">
      <div class="bg-check">
        <img src="favicon.svg" width="32" height="32" alt="32px favicon"/>
      </div>
      <div class="label">favicon.svg<br/><span class="size">32×32</span></div>
    </div>

    <div class="item">
      <div class="bg-check">
        <img src="favicon.svg" width="64" height="64" alt="32px favicon 2x"/>
      </div>
      <div class="label">favicon.svg<br/><span class="size">32×32 @ 2×</span></div>
    </div>

    <div class="item">
      <div class="bg-check">
        <img src="apple-touch-icon.svg" width="60" height="60" alt="Apple touch icon small"/>
      </div>
      <div class="label">apple-touch-icon.svg<br/><span class="size">180×180 @ 0.33×</span></div>
    </div>

    <div class="item">
      <div class="bg-check">
        <img src="apple-touch-icon.svg" width="180" height="180" alt="Apple touch icon"/>
      </div>
      <div class="label">apple-touch-icon.svg<br/><span class="size">180×180 actual</span></div>
    </div>

  </div>

  <hr style="border-color: rgba(226,234,248,.1); margin: 48px 0 32px;"/>
  <p style="color:rgba(226,234,248,.4); font-size:12px;">Atrya · Caplend Technologies GmbH · atrya.io</p>
</body>
</html>
